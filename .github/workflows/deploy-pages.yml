# Builds the Vite app and pushes dist/ to the gh-pages branch.
# GitHub Pages must publish from branch "gh-pages" / (root) — NOT from "main"
# (main has dev index.html that points at /src/main.jsx and will show a blank page).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: SPA fallback for client-side routes
        run: cp dist/index.html dist/404.html

      - name: Push dist to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
